name: credit-default-risk

channels:
    - conda-forge
    - defaults

dependencies:
    - python=3.9

    # Core libraries
    - numpy=1.23.5
    - pandas=1.5.3

    # Visualization
    - matplotlib=3.7.1
    - seaborn=0.12.2

    # Machine Learning
    - scikit-learn=1.2.2
    - xgboost=1.7.6
    - imbalanced-learn=0.11.0

    # Model persistence
    - joblib=1.3.2

    # Notebook support (optional)
    - jupyterlab=3.6.3
    - ipykernel=6.25.0

    # Pip (keep for flexibility)
    - pip

    # API Deployment
    - fastapi=0.115
    - uvicorn=0.30
    - pydantic=2.8
    - python-multipart=0.0.9
